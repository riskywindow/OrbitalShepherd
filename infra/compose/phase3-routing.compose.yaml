services:
  phase3-routing-db:
    image: pgrouting/pgrouting:16-3.5-4.0
    restart: unless-stopped
    environment:
      POSTGRES_DB: orbital_shepherd_phase3
      POSTGRES_USER: orbital
      POSTGRES_PASSWORD: orbital
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orbital -d orbital_shepherd_phase3"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - phase3-routing-pgdata:/var/lib/postgresql/data

volumes:
  phase3-routing-pgdata:

